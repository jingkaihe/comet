[tools]
# Core language and runtime tools
go = "1.26.2"
npm = "11.16.0"
node = "24.16.0"
"npm:tsx" = "4.22.4"

# Search and file finding tools
ripgrep = "15.1.0"
fd = "10.3.0"

# Development and release tools
golangci-lint = "2.11.4"
air = "latest"
gh = "latest"
goreleaser = "latest"

"go:golang.org/x/tools/gopls" = "latest"
"go:honnef.co/go/tools/cmd/staticcheck" = "latest"
"go:mvdan.cc/gofumpt" = "latest"

[settings]
experimental = true

[env]
# Version-related environment variables
VERSION = "{{exec(command='version=${VERSION:-$(cat VERSION.txt)}; printf %s \"${version#v}\"')}}"
VERSION_TAG = "{{exec(command='version=${VERSION:-$(cat VERSION.txt)}; case \"$version\" in v*) printf %s \"$version\" ;; *) printf v%s \"$version\" ;; esac')}}"
GIT_COMMIT = "{{exec(command='echo ${GIT_COMMIT:-$(git rev-parse --short HEAD 2>/dev/null || echo unknown)}')}}"
BUILD_TIME = "{{exec(command='echo ${BUILD_TIME:-$(date -u \"+%a %b %d %H:%M:%S UTC %Y\")}')}}"

# Version package path for ldflags
VERSION_PKG = "github.com/jingkaihe/comet/internal/version"

[tasks.code-generation]
description = "Generate embedded frontend assets"
run = ["go generate ./internal/web"]

[tasks.build]
description = "Build the application with embedded web UI"
depends = ["code-generation"]
run = [
  "mkdir -p bin",
  "echo 'Building comet binary...'",
  "CGO_ENABLED=0 go build -ldflags=\"-X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/comet ./cmd/comet/",
]

[tasks.build-dev]
description = "Build the Go application without regenerating frontend assets"
run = [
  "mkdir -p bin",
  "echo 'Building comet binary (without frontend regeneration)...'",
  "CGO_ENABLED=0 go build -ldflags=\"-X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/comet ./cmd/comet/",
]

[tasks.dev-server]
description = "Run development server with auto-reload"
run = ["echo 'Starting development server with auto-reload...'; air"]

[tasks.test]
description = "Run frontend and Go tests"
depends = ["frontend-test", "code-generation"]
run = ["go test ./..."]

[tasks.format]
description = "Format Go code with gofumpt"
run = ["gofumpt -w ."]

[tasks.lint]
description = "Run Go linters"
depends = ["code-generation"]
run = ["go vet ./...", "echo 'Running golangci-lint...'; golangci-lint run"]

[tasks.install-npm]
description = "Install npm dependencies for frontend"
run = [
  "echo 'Installing npm dependencies for frontend...'",
  "cd internal/web/frontend && npm install",
]

[tasks.frontend-test]
description = "Run frontend tests and typecheck"
run = [
  "echo 'Running frontend tests...'",
  "cd internal/web/frontend && npm test && npm run typecheck",
]

[tasks.frontend-test-watch]
description = "Run frontend tests in watch mode"
run = [
  "echo 'Running frontend tests in watch mode...'",
  "cd internal/web/frontend && npx vitest",
]

[tasks.cross-build]
description = "Cross-compile for multiple platforms"
depends = ["code-generation"]
run = [
  "mkdir -p bin",
  "echo 'Cross-compiling for multiple platforms...'",
  "CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/comet-linux-amd64 ./cmd/comet/",
  "CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/comet-linux-arm64 ./cmd/comet/",
  "CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/comet-darwin-amd64 ./cmd/comet/",
  "CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags=\"-s -w -X '$VERSION_PKG.Version=$VERSION' -X '$VERSION_PKG.GitCommit=$GIT_COMMIT' -X '$VERSION_PKG.BuildTime=$BUILD_TIME'\" -o ./bin/comet-darwin-arm64 ./cmd/comet/",
]

[tasks.release-snapshot]
description = "Build GoReleaser snapshot artifacts"
run = ["goreleaser release --snapshot --clean"]

[tasks.release]
description = "Build and test release snapshot artifacts"
depends = ["test"]
run = ["mise run release-snapshot"]

[tasks.push-tag]
description = "Push version tag to trigger automated GitHub Actions release"
run = [
  "echo 'Creating and pushing tag $VERSION_TAG...'",
  "if git rev-parse \"$VERSION_TAG\" >/dev/null 2>&1; then echo 'Tag $VERSION_TAG already exists locally. Pushing to origin...'; else echo 'Creating new tag $VERSION_TAG...'; git tag \"$VERSION_TAG\"; fi",
  "git push origin \"$VERSION_TAG\"",
  "echo 'Tag $VERSION_TAG pushed successfully!'",
  "echo 'GitHub Actions will automatically create a release with binaries.'",
]

# Convenience aliases for common tasks
[tasks.serve]
description = "Start the web terminal server"
depends = ["build"]
run = ["./bin/comet serve"]

[tasks.serve-dev]
description = "Start the web terminal server without auth"
depends = ["build"]
run = ["./bin/comet serve --skip-auth"]

[tasks.install]
description = "Install all dependencies"
run = [
  "echo 'Installing Go modules...'",
  "go mod download",
  "echo 'Installing frontend npm dependencies...'",
  "cd internal/web/frontend && npm install",
  "echo 'All dependencies installed successfully!'",
]
